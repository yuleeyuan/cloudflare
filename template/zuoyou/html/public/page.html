{if$__PAGING__.page_total>1}
<div class="pagination">
    <a href="{$__PAGING__.page_url|mac_url_page=1}" class="page-btn{if$__PAGING__['page_current']==1} active{/if}">首页</a>
    <a href="{$__PAGING__.page_url|mac_url_page=$__PAGING__.page_prev}" class="page-btn{if$__PAGING__['page_current']==1} active{/if}"><i class="fas fa-chevron-left"></i></a>
    {maccms:foreach name="$__PAGING__.page_num" id="num"}
    <a href="{$__PAGING__.page_url|mac_url_page=$num}" class="page-btn{if condition="$__PAGING__['page_current'] eq $num"} active{/if}">{$num}</a>
    {/maccms:foreach}
    <a href="{$__PAGING__.page_url|mac_url_page=$__PAGING__.page_next}" class="page-btn{if$__PAGING__['page_current']==$__PAGING__.page_total} active{/if}"><i class="fas fa-chevron-right"></i></a>
    <a href="{$__PAGING__.page_url|mac_url_page=$__PAGING__.page_total}" class="page-btn{if$__PAGING__['page_current']==$__PAGING__.page_total} active{/if}">尾页</a>	
</div>
{/if}
